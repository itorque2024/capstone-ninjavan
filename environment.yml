name: ninjavan
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Data science core
  - numpy=1.26.4
  - pandas=2.2.3
  - scipy=1.14.1
  - scikit-learn=1.5.2
  - joblib=1.4.2
  - tqdm=4.67.0

  # ML models
  - xgboost=2.1.1
  - lightgbm=4.5.0
  - imbalanced-learn=0.12.3

  # Visualisation
  - matplotlib=3.9.2
  - seaborn=0.13.2
  - plotly=5.24.1

  # UI
  - streamlit=1.40.0

  # Utilities
  - python-dotenv=1.0.1
  - ipykernel          # lets VSCode use this env as a Jupyter kernel
  - pre-commit         # secret-leak guard (run: pre-commit install)

  - pip:
    # Time-series forecasting (pip on M2 — conda-forge doesn't have 1.1.6 for osx-arm64)
    - prophet==1.1.6

    # Deep learning — pip gives the latest M2-native build + Metal GPU support
    - tensorflow==2.17.0
    - tensorflow-metal   # Apple Silicon GPU acceleration

    # GenAI / RAG
    - google-genai         # Gemini API — free tier via aistudio.google.com
    - langchain-google-genai
    - chromadb==0.5.20
    - langchain==0.3.7
    - langgraph==0.2.50

    # Deployment
    - modal==0.64.0
